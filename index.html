<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABELA NUTRIÇAO</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <header>
        <div class="container">
            <h1 class="titulo">MORAES NUTRIÇAO</h1>
        </div>
    </header>
    <main>
        <section class="container">
            <h2 class="titulo-secundario">Meus clientes</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Peso (kg)</th>
                        <th>Altura (m)</th>
                        <th>Gordura Corporal (%)</th>
                        <th>IMC</th>
                        
                    </tr>
                </thead>
                <tbody id="tabela-pacientes"></tbody>
                    <tr class="paciente" id="primeiro-paciente">
                        <td class="nome-paciente">Paulo</td>
                        <tb class="peso-paciente">100</tb>
                        <tb class="altura-paciente">2.00</tb>
                        <tb class="info-gordura">10</tb>
                        <tb class="info-imc">0</tb>
                    </tr>
                    <tr class="paciente" id="segundo-paciente">
                        <td class="nome-paciente">tatiana</td>
                        <tb class="peso-paciente">45</tb>
                        <tb class="altura-paciente">1.55</tb>
                        <tb class="info-gordura">19</tb>
                        <tb class="info-imc">0</tb>
                    </tr>
                    <tr class="paciente" id="terceiro-paciente">
                        <td class="nome-paciente">leandro</td>
                        <tb class="peso-paciente">80</tb>
                        <tb class="altura-paciente">1.75</tb>
                        <tb class="info-gordura">19</tb>
                        <tb class="info-imc">0</tb>
                    </tr>
               
               
        </section> 
     </main>
</body>
</html>
